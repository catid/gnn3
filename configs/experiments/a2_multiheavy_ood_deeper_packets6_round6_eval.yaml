name: a2_multiheavy_ood_deeper_packets6_round6_eval
bucket: exploit
stage: scout
notes: round6 rebalanced OOD deeper-tree and packets6 evaluation for fresh multiheavy baselines
seed: 401
output_dir: artifacts/experiments/a2_multiheavy_ood_deeper_packets6_round6_eval
benchmark:
  val_episodes: 64
  test_episodes: 64
  curriculum_levels: [multi_dynamic]
  hidden_corridor:
    seed: 401
    tree_depth_min: 3
    tree_depth_max: 4
    packets_min: 2
    packets_max: 6
    community_base_queue: [1.0, 6.0]
    deadline_mode: oracle_calibrated
    deadline_slack_ratio_range: [0.05, 0.15]
    deadline_slack_abs_range: [0.25, 1.0]
train:
  eval_batch_size: 32
  device: cuda:0
  bf16: true
  rollout_eval_episodes: 16
model:
  d_model: 128
  d_state: 16
  inner_layers: 2
  outer_steps: 3
  router_variant: memory_hubs
  final_step_only_loss: true
  detach_warmup: true
  penultimate_grad_prob: 0.25
