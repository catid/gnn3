name: a3_e3_multiheavy_path_reranker_ood_branching3_round4_eval
bucket: exploit
stage: scout
notes: round4 OOD stress for the combined multiheavy plus path-reranker exploit leader on higher branching and queue load
seed: 402
output_dir: artifacts/experiments/a3_e3_multiheavy_path_reranker_ood_branching3_round4_eval
benchmark:
  val_episodes: 64
  test_episodes: 64
  curriculum_levels: [multi_dynamic]
  hidden_corridor:
    seed: 402
    tree_depth_min: 2
    tree_depth_max: 3
    branching_factor: 3
    packets_min: 2
    packets_max: 6
    community_base_queue: [1.5, 7.0]
    deadline_mode: oracle_calibrated
    deadline_slack_ratio_range: [0.04, 0.14]
    deadline_slack_abs_range: [0.25, 1.0]
train:
  eval_batch_size: 24
  device: cuda:0
  bf16: true
  rollout_eval_episodes: 16
model:
  d_model: 128
  d_state: 16
  inner_layers: 2
  outer_steps: 3
  router_variant: memory_hubs
  final_step_only_loss: true
  detach_warmup: true
  penultimate_grad_prob: 0.25
  path_reranker: true
  path_reranker_weight: 0.75
