name: a1_multiheavy_ood_branching3_round9_eval_seed316
bucket: exploit
seed: 316
stage: eval
notes: round9 OOD branching3 evaluation manifest for matched compute-and-state comparisons on seed316
output_dir: artifacts/experiments/a1_multiheavy_ood_branching3_round9_eval_seed316
benchmark:
  train_episodes: 180
  val_episodes: 48
  test_episodes: 48
  curriculum_levels: [multi_dynamic]
  hidden_corridor:
    seed: 316
    tree_depth_min: 3
    tree_depth_max: 3
    branching_factor: 3
    packets_max: 4
    deadline_mode: oracle_calibrated
    deadline_slack_ratio_range: [0.05, 0.12]
    deadline_slack_abs_range: [0.2, 0.8]
train:
  device: cuda:0
model:
  d_model: 128
  d_state: 16
  inner_layers: 2
  outer_steps: 3
  router_variant: memory_hubs
  final_step_only_loss: true
  detach_warmup: true
  penultimate_grad_prob: 0.25
