name: a3_e3_multiheavy_path_reranker_gated_round4_seed311
bucket: explore
seed: 311
stage: scout
notes: round4 explore scout bounding and traffic-gating the combined multiheavy plus path-reranker recipe to stabilize deeper/heavier OOD behavior
output_dir: artifacts/experiments/a3_e3_multiheavy_path_reranker_gated_round4_seed311
benchmark:
  train_episodes: 180
  val_episodes: 48
  test_episodes: 48
  curriculum_levels: [single_dynamic, multi_dynamic, multi_dynamic]
  hidden_corridor:
    seed: 311
    packets_max: 4
    deadline_mode: oracle_calibrated
    deadline_slack_ratio_range: [0.05, 0.15]
    deadline_slack_abs_range: [0.25, 1.0]
train:
  batch_size: 24
  eval_batch_size: 48
  epochs: 7
  device: cuda:1
  bf16: true
  rollout_eval_episodes: 16
model:
  d_model: 128
  d_state: 16
  inner_layers: 2
  outer_steps: 3
  router_variant: memory_hubs
  final_step_only_loss: true
  detach_warmup: true
  penultimate_grad_prob: 0.25
  path_reranker: true
  path_reranker_weight: 0.75
  path_reranker_bound: 1.25
  path_reranker_traffic_gate: true
  path_reranker_gate_bias: 1.25
  path_reranker_gate_sharpness: 4.0
  path_reranker_packet_weight: 0.35
