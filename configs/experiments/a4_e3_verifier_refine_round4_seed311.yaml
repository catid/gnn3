name: a4_e3_verifier_refine_round4_seed311
bucket: exploit
seed: 311
stage: scout
notes: round4 exploit scout with verifier-backed final-step auxiliary losses on the last two outer steps
output_dir: artifacts/experiments/a4_e3_verifier_refine_round4_seed311
benchmark:
  train_episodes: 128
  val_episodes: 32
  test_episodes: 32
  curriculum_levels: [single_dynamic, multi_dynamic]
  hidden_corridor:
    seed: 311
    packets_max: 4
    deadline_mode: oracle_calibrated
    deadline_slack_ratio_range: [0.05, 0.15]
    deadline_slack_abs_range: [0.25, 1.0]
train:
  batch_size: 24
  eval_batch_size: 48
  epochs: 5
  device: cuda:0
  bf16: true
  rollout_eval_episodes: 12
  deadline_bce_weight: 0.2
  slack_loss_weight: 0.15
  quantile_loss_weight: 0.1
model:
  d_model: 128
  d_state: 16
  inner_layers: 2
  outer_steps: 3
  router_variant: memory_hubs
  final_step_only_loss: true
  detach_warmup: true
  penultimate_grad_prob: 0.25
  deadline_head: true
  risk_aware_scoring: true
  verifier_aux_last_k_steps: 2
  on_time_score_weight: 0.75
  slack_score_weight: 0.25
  tail_score_weight: 0.5
