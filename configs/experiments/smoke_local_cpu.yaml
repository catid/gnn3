name: smoke_local_cpu
bucket: exploit
seed: 11
output_dir: artifacts/experiments/smoke_local_cpu
benchmark:
  train_episodes: 12
  val_episodes: 4
  test_episodes: 4
  curriculum_levels: [single_static, single_dynamic]
  hidden_corridor:
    seed: 11
    packets_max: 2
train:
  batch_size: 4
  eval_batch_size: 4
  epochs: 1
  device: cpu
  bf16: false
  rollout_eval_episodes: 2
model:
  d_model: 64
  d_state: 8
  inner_layers: 1
  outer_steps: 1
  router_variant: local
  final_step_only_loss: true
  detach_warmup: false
  penultimate_grad_prob: 0.0
