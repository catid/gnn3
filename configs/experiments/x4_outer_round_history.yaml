name: x4_outer_round_history
bucket: explore
seed: 208
output_dir: artifacts/experiments/x4_outer_round_history
benchmark:
  train_episodes: 160
  val_episodes: 48
  test_episodes: 48
  curriculum_levels: [single_dynamic, multi_dynamic]
  hidden_corridor:
    seed: 208
    packets_max: 4
train:
  batch_size: 24
  eval_batch_size: 48
  epochs: 6
  device: cuda:0
  bf16: true
  rollout_eval_episodes: 16
model:
  d_model: 128
  d_state: 16
  inner_layers: 2
  outer_steps: 3
  router_variant: selective_read
  final_step_only_loss: true
  detach_warmup: true
  penultimate_grad_prob: 0.2
  history_read: true
  max_history_steps: 8
