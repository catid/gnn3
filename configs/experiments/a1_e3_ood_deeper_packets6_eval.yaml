name: a1_e3_ood_deeper_packets6_eval
bucket: exploit
stage: scout
notes: eval-only OOD stress for E3 on deeper trees and more packets
seed: 401
output_dir: artifacts/experiments/a1_e3_ood_deeper_packets6_eval
benchmark:
  val_episodes: 64
  test_episodes: 64
  curriculum_levels: [multi_dynamic]
  hidden_corridor:
    seed: 401
    tree_depth_min: 3
    tree_depth_max: 4
    packets_min: 2
    packets_max: 6
    community_base_queue: [1.0, 6.0]
train:
  eval_batch_size: 32
  device: cuda:0
  bf16: true
  rollout_eval_episodes: 16
model:
  d_model: 128
  d_state: 16
  inner_layers: 2
  outer_steps: 3
  router_variant: memory_hubs
  final_step_only_loss: true
  detach_warmup: true
  penultimate_grad_prob: 0.25
