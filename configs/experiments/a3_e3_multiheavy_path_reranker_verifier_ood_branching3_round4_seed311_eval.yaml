name: a3_e3_multiheavy_path_reranker_verifier_ood_branching3_round4_seed311_eval
bucket: explore
seed: 311
stage: scout
notes: round4 OOD branching evaluation for the verifier-filtered multiheavy plus path-reranker scout on seed311
output_dir: artifacts/experiments/a3_e3_multiheavy_path_reranker_verifier_ood_branching3_round4_seed311_eval
benchmark:
  train_episodes: 180
  val_episodes: 48
  test_episodes: 48
  curriculum_levels: [single_dynamic, multi_dynamic, multi_dynamic]
  hidden_corridor:
    seed: 311
    packets_max: 4
    num_communities: 4
    tree_depth_min: 3
    tree_depth_max: 3
    branching_factor: 3
    deadline_mode: oracle_calibrated
    deadline_slack_ratio_range: [0.05, 0.15]
    deadline_slack_abs_range: [0.25, 1.0]
train:
  batch_size: 24
  eval_batch_size: 48
  epochs: 7
  device: cuda:0
  bf16: true
  rollout_eval_episodes: 16
model:
  d_model: 128
  d_state: 16
  inner_layers: 2
  outer_steps: 3
  router_variant: memory_hubs
  final_step_only_loss: true
  detach_warmup: true
  penultimate_grad_prob: 0.25
  path_reranker: true
  path_reranker_weight: 0.75
  path_reranker_bound: 1.25
  path_verifier_filter: true
  path_verifier_hard_mask: true
  path_verifier_slack_margin: 0.0
  path_verifier_penalty: 4.0
