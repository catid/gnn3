name: a3_e3_multiheavy_path_reranker_verifier_round4_seed312
bucket: explore
seed: 312
stage: scout
notes: round4 explore scout adding an explicit verifier-backed candidate feasibility filter on top of the bounded multiheavy plus path-reranker recipe
output_dir: artifacts/experiments/a3_e3_multiheavy_path_reranker_verifier_round4_seed312
benchmark:
  train_episodes: 180
  val_episodes: 48
  test_episodes: 48
  curriculum_levels: [single_dynamic, multi_dynamic, multi_dynamic]
  hidden_corridor:
    seed: 312
    packets_max: 4
    deadline_mode: oracle_calibrated
    deadline_slack_ratio_range: [0.05, 0.15]
    deadline_slack_abs_range: [0.25, 1.0]
train:
  batch_size: 24
  eval_batch_size: 48
  epochs: 7
  device: cuda:1
  bf16: true
  rollout_eval_episodes: 16
model:
  d_model: 128
  d_state: 16
  inner_layers: 2
  outer_steps: 3
  router_variant: memory_hubs
  final_step_only_loss: true
  detach_warmup: true
  penultimate_grad_prob: 0.25
  path_reranker: true
  path_reranker_weight: 0.75
  path_reranker_bound: 1.25
  path_verifier_filter: true
  path_verifier_hard_mask: true
  path_verifier_slack_margin: 0.0
  path_verifier_penalty: 4.0
