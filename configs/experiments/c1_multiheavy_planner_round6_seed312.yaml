name: c1_multiheavy_planner_round6_seed312
bucket: explore
seed: 312
stage: scout
notes: round6 exploration scout replacing the final selector with an explicit path-cost plus on-time planner decoder
output_dir: artifacts/experiments/c1_multiheavy_planner_round6_seed312
benchmark:
  train_episodes: 180
  val_episodes: 48
  test_episodes: 48
  curriculum_levels: [single_dynamic, multi_dynamic, multi_dynamic]
  hidden_corridor:
    seed: 312
    packets_max: 4
    deadline_mode: oracle_calibrated
    deadline_slack_ratio_range: [0.05, 0.15]
    deadline_slack_abs_range: [0.25, 1.0]
train:
  batch_size: 24
  eval_batch_size: 48
  epochs: 7
  device: cuda:1
  bf16: true
  rollout_eval_episodes: 16
  path_soft_target_weight: 0.15
  path_soft_target_temperature: 2.0
  path_soft_target_on_time_bonus: 1.0
  planner_cost_weight: 0.15
  planner_on_time_weight: 0.10
model:
  d_model: 128
  d_state: 16
  inner_layers: 2
  outer_steps: 3
  router_variant: memory_hubs
  final_step_only_loss: true
  detach_warmup: true
  penultimate_grad_prob: 0.25
  planner_decoder: true
  planner_hidden_dim: 96
  planner_cost_score_weight: 1.0
  planner_on_time_score_weight: 2.5
